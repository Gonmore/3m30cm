services:
  api-3m30cm:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: api-3m30cm-dev
    env_file:
      - .env
    command:
      [
        "sh",
        "-lc",
        "npm install --workspace @jump/api --include-workspace-root false && npm run prisma:generate --workspace @jump/api && npm run db:ensure --workspace @jump/api && npm run prisma:push --workspace @jump/api && npm run db:seed --workspace @jump/api && npm run dev --workspace @jump/api",
      ]
    volumes:
      - .:/workspace
      - /workspace/node_modules
    ports:
      - "4100:4100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4100/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - red-desarrollo

  web-3m30cm:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: web-3m30cm-dev
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: ["sh", "-lc", "npm install --workspace @jump/web --include-workspace-root false && npm run dev --workspace @jump/web -- --host 0.0.0.0 --port 4173"]
    volumes:
      - .:/workspace
      - /workspace/node_modules
    depends_on:
      api-3m30cm:
        condition: service_healthy
    ports:
      - "4173:4173"
    networks:
      - red-desarrollo

networks:
  red-desarrollo:
    external: true
